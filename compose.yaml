services:
  usermanagement:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usermanagement
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - elasticsearch

  postgres:
    image: postgres:latest
    container_name: postgres-usermanagement
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usermanagement
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis-usermanagement
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: elasticsearch-usermanagement
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
      - "9300:9300"

  kibana:
    image: kibana:8.17.0
    container_name: kibana-usermanagement
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
      